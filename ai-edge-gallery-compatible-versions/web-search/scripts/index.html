<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search</title>
  </head>
  <body>
    <script>
      /**
       * Search DuckDuckGo for instant answers and Wikipedia for detailed summaries.
       * Falls back gracefully: DDG instant answer -> Wikipedia -> error message.
       *
       * @param {string} query - The search query.
       * @param {string} lang - Two-letter language code (default: "en").
       */
      async function searchWeb(query, lang) {
        let results = [];

        // Strategy 1: DuckDuckGo Instant Answer API (no key required)
        try {
          const ddgParams = new URLSearchParams({
            q: query,
            format: "json",
            no_html: "1",
            skip_disambig: "1",
          });
          const ddgRes = await fetch(
            `https://api.duckduckgo.com/?${ddgParams.toString()}`
          );
          if (ddgRes.ok) {
            const ddg = await ddgRes.json();
            if (ddg.Abstract) {
              results.push(
                `--- ${ddg.Heading || "Summary"} (${ddg.AbstractSource || "DuckDuckGo"}) ---\n${ddg.Abstract}`
              );
            }
            if (ddg.Answer) {
              results.push(`--- Answer ---\n${ddg.Answer}`);
            }
            if (ddg.RelatedTopics) {
              const topics = ddg.RelatedTopics
                .filter((t) => t.Text)
                .slice(0, 5)
                .map((t) => t.Text);
              if (topics.length > 0) {
                results.push(
                  `--- Related Topics ---\n${topics.join("\n")}`
                );
              }
            }
          }
        } catch (e) {
          console.warn("DuckDuckGo search failed:", e);
        }

        // Strategy 2: Wikipedia API (reliable fallback)
        try {
          const wikiLang = lang || "en";
          const baseUrl = `https://${wikiLang}.wikipedia.org/w/api.php`;
          const searchParams = new URLSearchParams({
            action: "query",
            format: "json",
            generator: "search",
            gsrsearch: query,
            gsrlimit: "3",
            prop: "extracts",
            explaintext: "1",
            exintro: "1",
            origin: "*",
          });
          const wikiRes = await fetch(
            `${baseUrl}?${searchParams.toString()}`
          );
          if (wikiRes.ok) {
            const wikiData = await wikiRes.json();
            if (wikiData.query && wikiData.query.pages) {
              const pages = Object.values(wikiData.query.pages);
              for (const page of pages) {
                if (page.extract) {
                  results.push(
                    `--- ${page.title} (Wikipedia) ---\n${page.extract}`
                  );
                }
              }
            }
          }
        } catch (e) {
          console.warn("Wikipedia search failed:", e);
        }

        if (results.length === 0) {
          return {
            error: `No results found for '${query}'. Try rephrasing with broader terms.`,
          };
        }

        // Cap total output to preserve context window
        let combined = results.join("\n\n");
        const maxChars = 5000;
        if (combined.length > maxChars) {
          combined =
            combined.substring(0, maxChars) +
            "\n\n... [TRUNCATED TO SAVE CONTEXT]";
        }

        return { query: query, result: combined };
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query) {
            return JSON.stringify({
              error: "No query provided. Pass a 'query' field.",
            });
          }
          const response = await searchWeb(
            jsonData.query,
            jsonData.lang || "en"
          );
          return JSON.stringify(response);
        } catch (e) {
          console.error(e);
          return JSON.stringify({
            error: `Search failed: ${e.message}`,
          });
        }
      };
    </script>
  </body>
</html>
